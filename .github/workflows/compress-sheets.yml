name: Compress Worship Sheets

on:
  schedule:
    # Saturday 20:00 UTC = Sunday 04:00 CST, runs before Sunday service
    - cron: '0 20 * * 6'
  workflow_dispatch:
    inputs:
      force_all:
        description: 'Force re-compress all images (ignore cache)'
        required: false
        default: 'false'

jobs:
  compress:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('scripts/requirements.txt') }}

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Compress worship sheet images
        env:
          DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
          DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
          DROPBOX_TEAM_ROOT_ID: ${{ secrets.DROPBOX_TEAM_ROOT_ID }}
          FORCE_ALL: ${{ github.event.inputs.force_all || 'false' }}
        run: python scripts/compress_sheets.py

      - name: Commit and push compressed images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/sheets/
          git diff --staged --quiet && echo "No changes to commit" || \
            git commit -m "chore: refresh compressed worship sheets [skip ci]" && git push
