const FOLDER_LIST_TTL_MS = 1000 * 60 * 30;

const LRU_EVICT_AT   = 0.80;                 // evict when IDB usage exceeds 80% quota

//==============================================================

const FIREBASE_CONFIG = {
  apiKey:            'AIzaSyBoETCY9qC1pXuP4qBvG-EQX2AN1Gbg-RE',
  authDomain:        'worship-sheets-zmzx.firebaseapp.com',

};
let _fbDbInst = null;
function fbDb() {
  if (_fbDbInst) return _fbDbInst;
  if (!FIREBASE_CONFIG.apiKey || FIREBASE_CONFIG.apiKey === 'YOUR_API_KEY') return null;
  try {
    if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);

function asciiJson(obj) {
  return JSON.stringify(obj).replace(/[^\x00-\x7F]/g,
    c => '\\u' + c.charCodeAt(0).toString(16).padStart(4, '0'));
}
const PATH_ROOT_HEADER = asciiJson({'.tag':'root','root':TEAM_ROOT_ID});

//==============================================================
// IndexedDB (kv + images + annotations)
//==============================================================
let _db;
function db() {
  if (_db) return _db;
  _db = new Promise((resolve, reject) => {
    const req = indexedDB.open('worship-app', 2);
    req.onupgradeneeded = (e) => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('kv')) d.createObjectStore('kv');
      if (!d.objectStoreNames.contains('images')) d.createObjectStore('images');
      if (!d.objectStoreNames.contains('annotations')) d.createObjectStore('annotations');
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
  return _db;
}
async function idbGet(store, key) {
  const d = await db();
  return new Promise((res, rej) => {
    const r = d.transaction(store, 'readonly').objectStore(store).get(key);
    r.onsuccess = () => res(r.result);
    r.onerror = () => rej(r.error);
  });
}
async function idbSet(store, key, value) {
  const d = await db();
  return new Promise((res, rej) => {
    const tx = d.transaction(store, 'readwrite');
    tx.objectStore(store).put(value, key);
    tx.oncomplete = () => res();
    tx.onerror = () => rej(tx.error);
  });
}

//==============================================================
// Auth
//==============================================================
let _accessToken = null, _accessTokenExpiry = 0;
async function getAccessToken(forceRefresh = false) {
  if (!forceRefresh && _accessToken && Date.now() < _accessTokenExpiry) return _accessToken;
  if (!forceRefresh) {
    try {
      const c = JSON.parse(sessionStorage.getItem('at') || 'null');
      if (c && c.expiry > Date.now()) { _accessToken = c.token; _accessTokenExpiry = c.expiry; return _accessToken; }
    } catch (e) {}
  }
  const p = new URLSearchParams({grant_type:'refresh_token',refresh_token:REFRESH_TOKEN,client_id:APP_KEY});
  const r = await fetch('https://api.dropboxapi.com/oauth2/token',
    {method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body:p.toString()});
  if (!r.ok) throw new Error('Token refresh failed: ' + r.status);
  const j = await r.json();
  _accessToken = j.access_token;
  _accessTokenExpiry = Date.now() + (Math.min(j.expires_in, 14400) * 1000) - 60000;
  try { sessionStorage.setItem('at', JSON.stringify({token: _accessToken, expiry: _accessTokenExpiry})); } catch(e) {}
  return _accessToken;
}

//==============================================================
// Dropbox API
//==============================================================
async function dbxApi(endpoint, body) {
  const token = await getAccessToken();
  const r = await fetch('https://api.dropboxapi.com' + endpoint, {
    method: 'POST',
    headers: {'Authorization':'Bearer '+token, 'Content-Type':'application/json', 'Dropbox-API-Path-Root':PATH_ROOT_HEADER},
    body: JSON.stringify(body)
  });
  if (r.status === 401) { await getAccessToken(true); return dbxApi(endpoint, body); }
  if (!r.ok) throw new Error('Dropbox API ' + r.status + ': ' + await r.text());
  return r.json();
}
async function dbxDownloadBytes(path) {
  const token = await getAccessToken();
  const r = await fetch('https://content.dropboxapi.com/2/files/download', {
    method: 'POST',
    headers: {'Authorization':'Bearer '+token, 'Dropbox-API-Path-Root':PATH_ROOT_HEADER,
      'Dropbox-API-Arg': asciiJson({path})}
  });
  if (r.status === 401) { await getAccessToken(true); return dbxDownloadBytes(path); }
  if (!r.ok) throw new Error('Download failed ' + r.status);
  return r.blob();
}
async function listFolder(path) {
  const j = await dbxApi('/2/files/list_folder', {path, recursive: false, limit: 200});
  return j.entries;
}

//==============================================================
// Folder parsing
//==============================================================
function parseFolderName(name) {
  const m = name.match(/^(\d{4})(\d{2})(\d{2})_(.+)$/);
  if (!m) return null;
  const [, y, mo, d, leader] = m;
  return { name, date: new Date(`${y}-${mo}-${d}T00:00:00`),
    dateStr: `${y}-${mo}-${d}`, leader: leader.trim() };
}
function findCurrentFolder(parsed, today = new Date()) {
  const t0 = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  let best = null, bestScore = -Infinity;
  for (const f of parsed) {
    const diff = Math.round((f.date - t0) / 86400000);
    let score;
    if (diff === 0) score = 1000;
    else if (diff > 0 && diff <= 6) score = 500 - diff;
    else if (diff < 0 && diff >= -6) score = 100 + diff;
    else continue;
    if (score > bestScore) { bestScore = score; best = f; }
  }
  return best;
}
function weekday(d) {
  return ['周日','周一','周二','周三','周四','周五','周六'][d.getDay()];
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

//==============================================================
// Image cache — tries CDN first, falls back to Dropbox IDB cache
//==============================================================
function cdnUrl(folderName, songName) {
  if (!CDN_BASE) return null;
  const safeFolder = folderName.replace(/[^\w\-.]/g, '_');
  const baseName = songName.replace(/\.[^.]+$/, '') + '.webp';
  return `${CDN_BASE}/sheets/${safeFolder}/${encodeURIComponent(baseName)}`;
}

async function getImageBlob(song, folderName) {
  // Try CDN (GitHub Pages compressed WebP) first
  const url = cdnUrl(folderName, song.name);
  if (url) {
    try {
      const r = await fetch(url);
      if (r.ok) return { url, fromCdn: true };
    } catch (e) {}
  }
  // Fall back to IDB cache then Dropbox
  const key = song.rev || song.path;
  const cached = await idbGet('images', key);
  if (cached) { touchLRUImage(key); return { blob: cached }; }
  const blob = await dbxDownloadBytes(song.path);
  idbSafeSet('images', key, blob).then(() => touchLRUImage(key));
  return { blob };
}

// Week list view
//==============================================================
async function renderWeekList(forceRefresh = false) {
  titleEl.textContent = '敬拜团歌谱';
  backBtn.style.display = 'none';
  app.innerHTML = '<div class="empty"><div class="msg">正在读取周列表...</div></div>';

  let folders;
  try {
    if (!forceRefresh) {
      const cached = await idbGet('kv', 'week_list');
      if (cached && Date.now() - cached.t < FOLDER_LIST_TTL_MS) folders = cached.entries;
    }
    if (!folders) {
      const entries = await listFolder(WORSHIP_PATH);
      folders = entries.filter(e => e['.tag'] === 'folder').map(e => ({name: e.name, id: e.id}));
      await idbSet('kv', 'week_list', {t: Date.now(), entries: folders});
    }
  } catch (err) {
    const cached = await idbGet('kv', 'week_list');
    if (cached) {
      folders = cached.entries;
      showToast('使用缓存（' + Math.round((Date.now() - cached.t) / 60000) + ' 分钟前）');
    } else {
      app.innerHTML = `<div class="empty">
        <div class="msg">无法读取歌谱，请检查网络</div>
        <div class="hint">${escapeHtml(err.message || String(err))}</div>
        <div class="hint" style="margin-top:16px;">
          <a href="${FALLBACK_DROPBOX_URL}" target="_blank" rel="noopener">在 Dropbox 网页里打开</a>
        </div></div>`;
      return;
    }
  }

  const parsed = folders.map(f => parseFolderName(f.name)).filter(Boolean);
  parsed.sort((a, b) => b.date - a.date);
  const current = findCurrentFolder(parsed);

  const RECENT_COUNT = 4;
  const recentWeeks = parsed.slice(0, RECENT_COUNT);
  const olderWeeks  = parsed.slice(RECENT_COUNT);

  // Read song caches in parallel for all displayed weeks
  const songCacheMap = {};
  await Promise.all([...recentWeeks, ...olderWeeks].map(async f => {
    try {
      const c = await idbGet('kv', 'songs:' + f.name);
      if (c?.entries?.length) {
        songCacheMap[f.name] = c.entries
          .map(s => normalizeFileName(s.name)).filter(Boolean);
      }
    } catch (e) {}
  }));

  function weekCardHtml(f) {
    const isCurr = current && f.name === current.name;
    const songs  = songCacheMap[f.name] || [];
    const songLine = songs.length
      ? `<div class="week-songs">${escapeHtml(songs.join('  ·  '))}</div>` : '';
    return `<a class="week-card${isCurr?' current':''}" href="#/w/${encodeURIComponent(f.name)}">
      ${isCurr ? '<span class="badge">本周</span>' : ''}
      <div class="date">${f.dateStr.replace(/-/g,'/')} <span style="color:#aaa;font-size:13px;">${weekday(f.date)}</span></div>
      <div class="leader">${escapeHtml(f.leader)}</div>
      ${songLine}
    </a>`;
  }

  let weekHtml = '<div class="week-list">';
  weekHtml += `<div class="hint">共 ${parsed.length} 个主日</div>`;
  for (const f of recentWeeks) weekHtml += weekCardHtml(f);
  if (olderWeeks.length) {
    weekHtml += `<div id="olderWeeks" style="display:none;">`;
    for (const f of olderWeeks) weekHtml += weekCardHtml(f);
    weekHtml += `</div>`;
    weekHtml += `<button class="expand-btn" id="expandBtn">查看更多（${olderWeeks.length} 个主日）</button>`;
  }
  weekHtml += '</div>';
  weekHtml += '<a class="stats-link" href="#/stats">服事统计分析</a>';

  app.innerHTML = `<div class="view">
    <div class="search-wrap">
      <input class="search-inp" id="searchInp" type="search" placeholder="搜索历史歌曲..."
        autocomplete="off" autocorrect="off" spellcheck="false" inputmode="search">
    </div>
    <div class="index-hint" id="indexHint"></div>
    <div id="searchResults" class="search-results" style="display:none;"></div>
    <div id="weekContent">${weekHtml}</div>
  </div>`;

  const expandBtn = document.getElementById('expandBtn');
  if (expandBtn) {
    expandBtn.addEventListener('click', () => {
      document.getElementById('olderWeeks').style.display = '';
      expandBtn.style.display = 'none';
    });
  }

  // Load cached index into memory, then refresh in background if stale
  loadSongIndex();
  buildSongIndexInBackground();

  // Wire search input
  const searchInp = document.getElementById('searchInp');
  const searchResultsEl = document.getElementById('searchResults');
  const weekContentEl = document.getElementById('weekContent');
  searchInp.addEventListener('input', () => {
    const q = searchInp.value.trim();
    if (!q) {
      searchResultsEl.style.display = 'none';
      weekContentEl.style.display = '';
      return;
    }
    weekContentEl.style.display = 'none';
    searchResultsEl.style.display = '';
    const results = searchSongs(q);
    if (!results.length) {
      searchResultsEl.innerHTML = `<div class="sr-empty">${
        _songIndexMem ? '没有找到匹配的歌曲' : '曲库索引建立中，请稍候...'
      }</div>`;
      return;
    }
    searchResultsEl.innerHTML = results.map(s =>
      `<div class="sr-item" data-path="${escapeHtml(s.path)}">
        <span class="sr-name">${escapeHtml(s.name)}</span>
        <span class="sr-folder">${escapeHtml(s.folder)}</span>
      </div>`
    ).join('');
    searchResultsEl.querySelectorAll('.sr-item').forEach(el => {
      el.addEventListener('click', () => {
        location.hash = '#/song/' + encodeURIComponent(el.dataset.path);
      });
    });
  });
}

//==============================================================
// AnnotationCtrl — canvas overlay drawing with IDB persistence
//==============================================================
class AnnotationCtrl {
  constructor(stage, slide) {
    this._stage = stage;
    this._slide = slide;
    this._strokes = [];
    this._cur = null;       // current in-progress stroke
    this._imgEl = null;
    this._songKey = null;
    this._color = '#333333';
    this._width = 2;
    this._active = false;
    this._canvas = null;
    this._ctx = null;
    this._cssW = 0;
    this._cssH = 0;
    this._ro = null;
    this._createCanvas();
  }

  _createCanvas() {
    const canvas = document.createElement('canvas');
    canvas.className = 'annot-canvas';
    this._slide.appendChild(canvas);
    this._canvas = canvas;
    this._ctx = canvas.getContext('2d');
    this._bindPointerEvents(canvas);
  }

  // Call after a new image is placed in the slide
  setImage(imgEl, songKey) {
    this._imgEl = imgEl;
    this._songKey = songKey;
    this._strokes = [];
    this._cur = null;
    this._syncSize();
    this._loadFromDb();
  }

  setActive(on) {
    this._active = on;
    this._canvas.className = 'annot-canvas' + (on ? ' active' : '');
  }
  setColor(c) { this._color = c; }
  setWidth(w) { this._width = w; }

  _syncSize() {
    const img = this._imgEl;
    if (!img) return;
    const doSync = () => {
      const cssW = img.offsetWidth;
      const cssH = img.offsetHeight;
      if (!cssW || !cssH) return;
      const dpr = window.devicePixelRatio || 1;
      this._cssW = cssW;
      this._cssH = cssH;
      this._canvas.width = Math.round(cssW * dpr);
      this._canvas.height = Math.round(cssH * dpr);
      this._canvas.style.width = cssW + 'px';
      this._canvas.style.height = cssH + 'px';
      this._ctx.resetTransform();
      this._ctx.scale(dpr, dpr);
      this._redraw();
    };
    if (img.complete && img.naturalWidth) doSync();
    else img.addEventListener('load', doSync, {once: true});
    if (this._ro) this._ro.disconnect();
    this._ro = new ResizeObserver(doSync);
    this._ro.observe(img);
  }

  _bindPointerEvents(canvas) {
    const getN = (e) => {
      // Normalized coordinates relative to canvas CSS size
      const rect = canvas.getBoundingClientRect();
      return [
        (e.clientX - rect.left) / (rect.width || 1),
        (e.clientY - rect.top) / (rect.height || 1)
      ];
    };

    canvas.addEventListener('pointerdown', (e) => {
      if (!this._active) return;
      e.preventDefault();
      canvas.setPointerCapture(e.pointerId);
      this._cur = { c: this._color, w: this._width, pts: [getN(e)] };
    }, {passive: false});

    canvas.addEventListener('pointermove', (e) => {
      if (!this._active || !this._cur) return;
      e.preventDefault();
      this._cur.pts.push(getN(e));
      this._redraw();
    }, {passive: false});

    const endStroke = () => {
      if (!this._cur) return;
      if (this._cur.pts.length > 1) {
        this._strokes.push(this._cur);
        this._saveToDb();
      }
      this._cur = null;
    };
    canvas.addEventListener('pointerup', endStroke);
    canvas.addEventListener('pointercancel', () => { this._cur = null; });
  }

  _redraw() {
    const ctx = this._ctx;
    const w = this._cssW, h = this._cssH;
    if (!ctx || !w || !h) return;
    ctx.clearRect(0, 0, w, h);
    const allStrokes = this._cur ? [...this._strokes, this._cur] : this._strokes;
    for (const s of allStrokes) {
      if (s.pts.length < 2) continue;
      ctx.save();
      ctx.strokeStyle = s.c;
      ctx.lineWidth = s.w;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.beginPath();
      ctx.moveTo(s.pts[0][0] * w, s.pts[0][1] * h);
      for (let i = 1; i < s.pts.length; i++) {
        ctx.lineTo(s.pts[i][0] * w, s.pts[i][1] * h);
      }
      ctx.stroke();
      ctx.restore();
    }
  }

  async _loadFromDb() {
    if (!this._songKey) return;
    try {
      const data = await idbGet('annotations', this._songKey);
      if (data) { this._strokes = data.strokes || []; this._redraw(); }
    } catch(e) {}
  }

  async _saveToDb() {
    if (!this._songKey) return;
    try { await idbSet('annotations', this._songKey, {strokes: this._strokes}); } catch(e) {}
  }

  undo() {
    if (!this._strokes.length) return;
    this._strokes.pop();
    this._redraw();
    this._saveToDb();
  }

  clear() {
    this._strokes = [];
    this._redraw();
    this._saveToDb();
  }

  destroy() {
    if (this._ro) this._ro.disconnect();
    // canvas stays in slide DOM until slide is replaced
  }
}

//==============================================================
// FlowCtrl — per-song worship flow editor with Firebase sync
//==============================================================
class FlowCtrl {
  constructor(barEl, dispEl, inpEl, statEl) {
    this._bar  = barEl;
    this._disp = dispEl;
    this._inp  = inpEl;
    this._stat = statEl;
    this._key       = null;
    this._dbRef     = null;
    this._fbCb      = null;   // Firebase .on() handler ref for .off()
    this._touchCb   = null;   // document touchstart handler ref for removeEventListener
    this._isEditing = false;
    this._writing   = false;  // true while .set() is in-flight
    this._saveTimer = null;
    this._remoteVal = '';
    this._bindUI();
  }

  _bindUI() {
    this._bar.addEventListener('click', () => {
      if (!this._isEditing) this._enterEdit();
    });

    this._inp.addEventListener('input', () => {
      clearTimeout(this._saveTimer);
      this._setStat('输入中...', 'ing');
      // Background auto-save: keep keyboard open, save silently
      this._saveTimer = setTimeout(() => this._push(this._inp.value, false), 1500);
    });

    this._inp.addEventListener('blur', () => {
      clearTimeout(this._saveTimer);
      // Guard: only commit if still in edit mode (setSong() sets _isEditing=false
      // before hiding the input, so spurious blur calls are safely ignored)
      if (this._isEditing) this._push(this._inp.value, true);
    });

    this._inp.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); this._push(this._inp.value, true); }
      if (e.key === 'Escape') {
        clearTimeout(this._saveTimer);
        this._isEditing = false;
        this._inp.style.display = 'none';
        this._disp.style.display = '';
        this._setDisp(this._remoteVal);
        this._setStat('', '');
      }
    });

    // iOS Safari does not fire blur when tapping non-interactive elements (images, divs).
    // Intercept any touch outside the flow bar and explicitly blur the input.
    this._touchCb = (e) => {
      if (this._isEditing && !this._bar.contains(e.target)) this._inp.blur();
    };
    document.addEventListener('touchstart', this._touchCb, { passive: true });
  }

  setSong(songName) {
    clearTimeout(this._saveTimer);
    // Leave any in-progress edit without saving when the song changes
    if (this._isEditing) {
      this._isEditing = false;
      this._inp.style.display = 'none';
      this._disp.style.display = '';
    }
    // Detach previous Firebase listener
    if (this._dbRef && this._fbCb) { this._dbRef.off('value', this._fbCb); this._fbCb = null; }
    this._dbRef = null;
    this._remoteVal = '';
    this._key = null;

    const norm = normalizeFileName(songName);
    if (!norm) { this._setDisp(''); this._setStat('', ''); return; }

    // Firebase keys cannot contain . # $ [ ] /
    this._key = norm.replace(/[.#$[\]/]/g, '_');

    // Show locally-pending value right away (before Firebase responds)
    const localPending = localStorage.getItem('flow_p:' + this._key);
    if (localPending !== null) {
      this._remoteVal = localPending;
      this._setDisp(localPending);
      this._setStat('离线·已暂存', 'pending');
    } else {
      this._setDisp('');
      this._setStat('', '');
    }

    const db = fbDb();
    if (!db) return;

    this._dbRef = db.ref('flows/' + this._key);
    this._fbCb = this._dbRef.on('value', snap => {
      const val = snap.val() != null ? String(snap.val()) : '';
      this._remoteVal = val;
      // Don't overwrite while user is typing or a write is in-flight
      if (this._isEditing || this._writing) return;
      // If the pending in localStorage matches what Firebase now has, the sync succeeded
      const pending = localStorage.getItem('flow_p:' + this._key);
      if (pending !== null && pending === val) localStorage.removeItem('flow_p:' + this._key);
      this._setDisp(val);
      if (!localStorage.getItem('flow_p:' + this._key)) this._setStat('', '');
    }, () => {});

    this._flushPending();
  }

  _enterEdit() {
    if (this._isEditing) return;
    this._isEditing = true;
    const pending = localStorage.getItem('flow_p:' + this._key);
    this._inp.value = pending !== null ? pending : this._remoteVal;
    this._disp.style.display = 'none';
    this._inp.style.display = 'block';
    this._inp.focus();
    this._setStat('输入中...', 'ing');
  }

  // close=true: exit edit mode (dismiss keyboard) then save
  // close=false: save in background, keyboard stays open
  _push(text, close) {
    if (close) {
      this._isEditing = false;
      this._inp.style.display = 'none';
      this._disp.style.display = '';
      this._setDisp(text);
    }

    const db = fbDb();
    if (navigator.onLine && db && this._dbRef) {
      this._writing = true;
      this._setStat('保存中...', 'saving');
      this._dbRef.set(text)
        .then(() => {
          this._writing = false;
          this._remoteVal = text;
          localStorage.removeItem('flow_p:' + this._key);
          this._setStat('已保存', 'saved');
          const mark = '已保存';
          setTimeout(() => {
            if (this._stat.textContent !== mark) return;
            // Restore status appropriate for current state
            this._setStat(this._isEditing ? '输入中...' : '', this._isEditing ? 'ing' : '');
          }, 2000);
        })
        .catch(() => { this._writing = false; this._saveLocal(text); });
    } else {
      this._saveLocal(text);
    }
  }

  _saveLocal(text) {
    if (!this._key) return;
    localStorage.setItem('flow_p:' + this._key, text);
    this._setStat('离线·已暂存', 'pending');
  }

  async _flushPending() {
    const db = fbDb();
    if (!navigator.onLine || !db || !this._key) return;
    const pending = localStorage.getItem('flow_p:' + this._key);
    if (pending === null) return;
    try {
      await db.ref('flows/' + this._key).set(pending);
      this._remoteVal = pending;
      localStorage.removeItem('flow_p:' + this._key);
      this._setStat('已同步', 'saved');
      const mark = '已同步';
      setTimeout(() => { if (this._stat.textContent === mark) this._setStat('', ''); }, 2000);
    } catch (e) {}
  }

  _setDisp(text) {
    this._disp.textContent = text || '点击添加敬拜流程...';
    this._disp.classList.toggle('flow-has', !!text);
  }

  _setStat(text, type) {
    this._stat.textContent = text;
    this._stat.className = 'flow-stat' + (type ? ' flow-s-' + type : '');
  }

  destroy() {
    clearTimeout(this._saveTimer);
    if (this._dbRef && this._fbCb) { this._dbRef.off('value', this._fbCb); this._fbCb = null; }
    if (this._touchCb) { document.removeEventListener('touchstart', this._touchCb); this._touchCb = null; }
  }
}

// When coming back online, push all locally-pending flows to Firebase
async function flushAllPendingFlows() {
  const db = fbDb();
  if (!db) return;
  const prefix = 'flow_p:';
  const toFlush = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith(prefix)) toFlush.push(k);
  }
  for (const lk of toFlush) {
    const songKey = lk.slice(prefix.length);
    const text = localStorage.getItem(lk);
    if (text !== null) {
      try {
        await db.ref('flows/' + songKey).set(text);
        localStorage.removeItem(lk);
      } catch (e) {}
    }
  }
}
window.addEventListener('online', flushAllPendingFlows);

//==============================================================
// ViewerCtrl — swipe carousel + pinch zoom + double-tap
//==============================================================
class ViewerCtrl {
  constructor(songs, folderName, annotCtrl, flowCtrl, linkCtrl) {
    this.songs = songs;
    this.folderName = folderName;
    this._annotCtrl = annotCtrl;
    this._flowCtrl  = flowCtrl;
    this._linkCtrl  = linkCtrl;
    this.idx = 0;
    this.stage = document.getElementById('stage');
    this.slide = document.getElementById('slide');
    this.indicator = document.getElementById('indicator');
    this.progress = document.getElementById('progress');
    this.scale = 1; this.tx = 0; this.ty = 0;
    this._blobUrls = {};
    this._annotMode = false;
    window.addEventListener('keydown', this._onKey = (e) => {
      if (e.key === 'ArrowLeft') this.go(-1);
      else if (e.key === 'ArrowRight') this.go(1);
    });
    this._bindGestures();
  }

  destroy() {
    window.removeEventListener('keydown', this._onKey);
    for (const u of Object.values(this._blobUrls)) URL.revokeObjectURL(u);
    if (this._annotCtrl) this._annotCtrl.destroy();
    if (this._flowCtrl)  this._flowCtrl.destroy();
    if (this._linkCtrl)  this._linkCtrl.destroy();
  }

  async start() {
    await this.show(0);
    if (this.songs.length > 1) this._preload(1);
    if (this.songs.length > 2) this._preload(2);
  }

  async _preload(i) {
    if (i < 0 || i >= this.songs.length || this._blobUrls[i]) return;
    try {
      const result = await getImageBlob(this.songs[i], this.folderName);
      if (result.fromCdn) {
        this._blobUrls[i] = result.url;
      } else if (result.blob && !this._blobUrls[i]) {
        this._blobUrls[i] = URL.createObjectURL(result.blob);
      }
    } catch (e) {}
  }

  _clearSlide() {
    // Remove everything in slide except the annotation canvas
    Array.from(this.slide.children).forEach(c => {
      if (!c.classList.contains('annot-canvas')) c.remove();
    });
  }

  async show(i) {
    if (i < 0 || i >= this.songs.length) return;
    this.idx = i;
    this._resetTransform();
    const song = this.songs[i];
    this.indicator.textContent = `${i+1} / ${this.songs.length}  ·  ${normalizeFileName(song.name)}`;

    this._clearSlide();
    const loadingEl = document.createElement('div');
    loadingEl.className = 'loading';
    loadingEl.textContent = '加载中...';
    this.slide.insertBefore(loadingEl, this.slide.firstChild);
    this.progress.style.width = '20%';

    try {
      let url = this._blobUrls[i];
      if (!url) {
        const result = await getImageBlob(song, this.folderName);
        if (result.fromCdn) {
          url = this._blobUrls[i] = result.url;
        } else {
          url = this._blobUrls[i] = URL.createObjectURL(result.blob);
        }
      }
      this.progress.style.width = '100%';
      const img = new Image();
      img.id = 'curImg';
      img.src = url;
      img.onload = () => { this.progress.style.width = '0'; };
      loadingEl.remove();
      this.slide.insertBefore(img, this.slide.firstChild);
      this._curImg = img;
      // Hand off to annotation controller
      if (this._annotCtrl) {
        const key = 'annot:' + this.folderName + ':' + song.name;
        this._annotCtrl.setImage(img, key);
      }
      // Update flow bar and link button for this song
      if (this._flowCtrl) this._flowCtrl.setSong(song.name);
      if (this._linkCtrl) this._linkCtrl.setSong(song.name);
    } catch (err) {
      this.progress.style.width = '0';
      loadingEl.remove();
      const errEl = document.createElement('div');
      errEl.className = 'err';
      errEl.textContent = '加载失败：' + (err.message || String(err));
      this.slide.insertBefore(errEl, this.slide.firstChild);
    }

    this._preload(i + 1);
    this._preload(i - 1);
    // Free far images
    for (const k of Object.keys(this._blobUrls)) {
      const ki = +k;
      if (Math.abs(ki - i) > 2) {
        const u = this._blobUrls[ki];
        if (u && !u.startsWith('http')) URL.revokeObjectURL(u);
        delete this._blobUrls[ki];
      }
    }
  }

  go(delta) {
    const ni = this.idx + delta;
    if (ni < 0 || ni >= this.songs.length) {
      this.slide.style.transform = `translateX(${delta < 0 ? 14 : -14}px)`;
      setTimeout(() => this.slide.style.transform = '', 180);
      return;
    }
    this.show(ni);
  }

  _resetTransform() {
    this.scale = 1; this.tx = 0; this.ty = 0;
    if (this._curImg) this._curImg.style.transform = '';
    this.stage.scrollTop = 0;
  }
  _applyTransform() {
    if (this._curImg)
      this._curImg.style.transform = `translate(${this.tx}px,${this.ty}px) scale(${this.scale})`;
  }

  _bindGestures() {
    let startX = 0, startY = 0, startDist = 0, startScale = 1, startTx = 0, startTy = 0;
    let mode = null;       // 'swipe' | 'pinch' | 'pan'
    let gestureDir = null; // 'h' | 'v'
    let lastTap = 0;

    const onStart = (e) => {
      if (this._annotMode) return;
      const t = e.touches;
      if (!t || !t.length) return;
      gestureDir = null;
      if (t.length === 2) {
        mode = 'pinch';
        startDist = dist2(t[0], t[1]);
        startScale = this.scale;
      } else {
        startX = t[0].clientX; startY = t[0].clientY;
        startTx = this.tx; startTy = this.ty;
        mode = this.scale > 1.05 ? 'pan' : 'swipe';
      }
    };

    const onMove = (e) => {
      if (this._annotMode) return;
      const t = e.touches;
      if (!t) return;
      if (mode === 'pinch' && t.length === 2) {
        e.preventDefault();
        this.scale = Math.max(1, Math.min(5, startScale * dist2(t[0],t[1]) / startDist));
        this._applyTransform();
        return;
      }
      if (mode === 'pan' && t.length === 1) {
        e.preventDefault();
        this.tx = startTx + (t[0].clientX - startX);
        this.ty = startTy + (t[0].clientY - startY);
        this._applyTransform();
        return;
      }
      if (mode === 'swipe' && t.length === 1) {
        const dx = t[0].clientX - startX;
        const dy = t[0].clientY - startY;
        if (!gestureDir && (Math.abs(dx) > 10 || Math.abs(dy) > 10)) {
          gestureDir = Math.abs(dx) > Math.abs(dy) ? 'h' : 'v';
        }
        if (gestureDir === 'h') {
          e.preventDefault();
          this.slide.style.transform = `translateX(${dx}px)`;
        }
      }
    };

    const onEnd = (e) => {
      if (this._annotMode) return;
      if (mode === 'swipe' && gestureDir === 'h') {
        const dx = e.changedTouches?.[0] ? e.changedTouches[0].clientX - startX : 0;
        this.slide.style.transform = '';
        if (Math.abs(dx) > 60) this.go(dx < 0 ? 1 : -1);
      } else if (mode === 'pinch') {
        if (this.scale < 1.05) this._resetTransform();
      }
      mode = null; gestureDir = null;
    };

    const onClick = () => {
      const now = Date.now();
      if (now - lastTap < 300) this._resetTransform();
      lastTap = now;
    };

    this.stage.addEventListener('touchstart', onStart, {passive: true});
    this.stage.addEventListener('touchmove', onMove, {passive: false});
    this.stage.addEventListener('touchend', onEnd);
    this.stage.addEventListener('touchcancel', onEnd);
    this.stage.addEventListener('click', onClick);
  }
}

function dist2(a, b) {
  const dx = a.clientX - b.clientX, dy = a.clientY - b.clientY;
  return Math.sqrt(dx*dx + dy*dy);
}
function stripExt(name) { return name.replace(/\.[^.]+$/, ''); }

//==============================================================
// Stats dashboard
//==============================================================
function normalizeFileName(name) {
  const noExt = name.replace(/\.[^.]+$/, '');
  // Extract CJK block as canonical song name — strips leading numbers like "01起来荣耀" → "起来荣耀"
  const cjk = noExt.match(/[一-鿿㐀-䶿豈-﫿　-〿！-￥·—…]+/g);
  if (cjk && cjk.length > 0) return cjk.join('');
  return noExt.replace(/^[\d\s._\-]+/, '').trim();
}

async function renderStats(doDeepScan = false) {
  titleEl.textContent = '服事统计';
  backBtn.style.display = '';
  app.innerHTML = '<div class="empty"><div class="msg">正在分析数据...</div></div>';

  const weekListData = await idbGet('kv', 'week_list');
  if (!weekListData) {
    app.innerHTML = '<div class="view"><div class="stats-page"><div class="empty"><div class="msg">暂无数据，请先浏览几个主日的歌谱</div></div></div></div>';
    return;
  }

  const folders = weekListData.entries;
  const parsed = folders.map(f => parseFolderName(f.name)).filter(Boolean);
  parsed.sort((a, b) => a.date - b.date);

  // If deep scan requested, load all uncached song lists from Dropbox
  if (doDeepScan) {
    showToast('正在扫描全部歌单，请稍候...', 10000);
    for (const f of parsed) {
      const key = 'songs:' + f.name;
      const c = await idbGet('kv', key);
      if (!c) {
        try {
          const entries = await listFolder(WORSHIP_PATH + '/' + f.name);
          const songs = entries
            .filter(e => e['.tag']==='file' && /\.(jpg|jpeg|png|gif|webp)$/i.test(e.name))
            .map(e => ({name: e.name, path: e.path_lower, rev: e.rev}));
          await idbSet('kv', key, {t: Date.now(), entries: songs});
        } catch(e) { /* skip */ }
      }
    }
    showToast('扫描完成');
  }

  // Song frequency from cached song lists
  const songMap = {};
  let cachedWeeks = 0;
  const totalWeeks = parsed.length;
  for (const f of parsed) {
    const c = await idbGet('kv', 'songs:' + f.name);
    if (!c) continue;
    cachedWeeks++;
    for (const s of c.entries) {
      const n = normalizeFileName(s.name);
      if (n) songMap[n] = (songMap[n] || 0) + 1;
    }
  }
  const topSongs = Object.entries(songMap).sort((a,b) => b[1]-a[1]).slice(0, 30);

  // Render
  const coveragePct = totalWeeks ? Math.round(cachedWeeks / totalWeeks * 100) : 0;
  let html = '<div class="view"><div class="stats-page">';

  // Summary boxes
  html += `<div class="stats-summary">
    <div class="stat-box"><div class="stat-num">${totalWeeks}</div><div class="stat-lbl">主日聚会</div></div>
    <div class="stat-box"><div class="stat-num">${Object.keys(songMap).length}</div><div class="stat-lbl">歌曲种类</div></div>
    <div class="stat-box"><div class="stat-num">${coveragePct}%</div><div class="stat-lbl">数据覆盖</div></div>
  </div>`;

  // Song frequency chart
  if (topSongs.length) {
    const maxS = topSongs[0][1];
    html += `<div class="stats-section"><div class="stats-h">常用歌曲 Top ${topSongs.length}</div>`;
    for (const [name, cnt] of topSongs) {
      html += `<div class="stats-row">
        <div class="stats-name">${escapeHtml(name)}</div>
        <div class="stats-bar-bg"><div class="stats-bar" style="width:${Math.round(cnt/maxS*100)}%"></div></div>
        <div class="stats-cnt">${cnt} 次</div>
      </div>`;
    }
    html += '</div>';
  }

  // Coverage note + deep scan
  html += `<div class="stats-note">
    歌曲数据基于已浏览的 ${cachedWeeks}/${totalWeeks} 个主日（${coveragePct}%）。`;
  if (cachedWeeks < totalWeeks) {
    html += `<br>点击深度扫描可读取全部，需要联网。`;
  }
  html += '</div>';
  if (cachedWeeks < totalWeeks) {
    html += `<button class="stats-scan-btn" id="deepScanBtn">深度扫描（${totalWeeks - cachedWeeks} 个主日）</button>`;
  }

  html += '</div></div>';
  app.innerHTML = html;

  const scanBtn = document.getElementById('deepScanBtn');
  if (scanBtn) scanBtn.addEventListener('click', () => renderStats(true));
}

//==============================================================
// Safe IDB write — quota check + silent fallback, never crashes UI
//==============================================================
async function idbSafeSet(store, key, value) {
  try {
    if (navigator.storage?.estimate) {
      const { usage, quota } = await navigator.storage.estimate();
      if (quota > 0 && usage / quota > LRU_EVICT_AT) await evictLRUImages();
    }
    await idbSet(store, key, value);
  } catch (e) { /* silently skip — cache miss is better than a crash */ }
}

//==============================================================
// LRU image cache — tracks access times, evicts oldest on pressure
//==============================================================
async function getLRUMeta() {
  return (await idbGet('kv', 'lru_meta')) || {};
}
function touchLRUImage(key) {
  // Fire-and-forget: don't block image display
  getLRUMeta().then(m => {
    m[key] = Date.now();
    idbSet('kv', 'lru_meta', m).catch(() => {});
  }).catch(() => {});
}
async function evictLRUImages() {
  try {
    const m = await getLRUMeta();
    const sorted = Object.entries(m).sort((a, b) => a[1] - b[1]);
    if (!sorted.length) return;
    const evictCount = Math.max(1, Math.floor(sorted.length * 0.30));
    const d = await db();
    for (const [key] of sorted.slice(0, evictCount)) {
      await new Promise(res => {
        const tx = d.transaction('images', 'readwrite');
        tx.objectStore('images').delete(key);
        tx.oncomplete = res; tx.onerror = res;
      });
      delete m[key];
    }
    await idbSet('kv', 'lru_meta', m);
  } catch (e) {}
}

//==============================================================
// Dropbox paginated folder listing (handles has_more cursor)
//==============================================================
async function listFolderFull(path, recursive = false) {
  let entries = [];
  let data = await dbxApi('/2/files/list_folder', { path, recursive, limit: 1000 });
  entries.push(...data.entries);
  while (data.has_more) {
    data = await dbxApi('/2/files/list_folder/continue', { cursor: data.cursor });
    entries.push(...data.entries);
  }
  return entries;
}

//==============================================================
// Song index — background build across all folders, 24h TTL
//==============================================================
let _songIndexMem = null;
let _indexBuilding = false;

async function loadSongIndex() {
  const stored = await idbGet('kv', 'song_index');
  if (stored?.songs) _songIndexMem = stored.songs;
}

function searchSongs(query) {
  if (!_songIndexMem || !query.trim()) return [];
  const q = query.trim();
  // Deduplicate by name — show one result per unique normalized name
  const seen = new Set();
  const results = [];
  for (const s of _songIndexMem) {
    if (!s.name.includes(q)) continue;
    if (seen.has(s.name)) continue;
    seen.add(s.name);
    results.push(s);
    if (results.length >= 60) break;
  }
  return results;
}

function _setIndexHint(text) {
  const el = document.getElementById('indexHint');
  if (el) el.textContent = text;
}

async function buildSongIndexInBackground() {
  if (_indexBuilding) return;
  _indexBuilding = true;
  try {
    const existing = await idbGet('kv', 'song_index');
    if (existing?.builtAt && Date.now() - existing.builtAt < INDEX_TTL_MS) {
      _songIndexMem = existing.songs;
      _indexBuilding = false;
      return;
    }
    _setIndexHint('正在建立曲库索引...');
    const songs = [];
    const topEntries = await listFolderFull(WORSHIP_PATH, false);

    // Non-week folders (往期, 歌谱汇总, etc.) → recursive scan
    const libFolders = topEntries.filter(e =>
      e['.tag'] === 'folder' && !parseFolderName(e.name));
    for (const lib of libFolders) {
      try {
        _setIndexHint(`扫描 ${lib.name}...`);
        const all = await listFolderFull(lib.path_lower, true);
        for (const e of all) {
          if (e['.tag'] !== 'file' || !/\.(jpg|jpeg|png|gif|webp)$/i.test(e.name)) continue;
          const norm = normalizeFileName(e.name);
          if (norm) songs.push({ name: norm, path: e.path_lower, rev: e.rev, folder: lib.name });
        }
      } catch (e) { /* skip inaccessible folder */ }
    }

    // Week folders → use cached song lists if available
    const weekFolders = topEntries.filter(e =>
      e['.tag'] === 'folder' && parseFolderName(e.name));
    for (const wf of weekFolders) {
      const c = await idbGet('kv', 'songs:' + wf.name);
      if (c?.entries) {
        for (const s of c.entries) {
          const norm = normalizeFileName(s.name);
          if (norm) songs.push({ name: norm, path: s.path, rev: s.rev, folder: wf.name });
        }
      }
    }

    await idbSafeSet('kv', 'song_index', { builtAt: Date.now(), songs });
    _songIndexMem = songs;
    _setIndexHint('');
  } catch (e) {
    _setIndexHint('');
  }
  _indexBuilding = false;
}

//==============================================================
// Library song viewer — single-song viewer for search results
//==============================================================
async function renderLibrarySong(path) {
  backBtn.style.display = '';
  const fileName = path.split('/').pop();
  titleEl.textContent = normalizeFileName(fileName) || fileName;
  app.innerHTML = `
    <div class="viewer">
      <div class="progress" id="progress"></div>
      <div class="stage" id="stage" style="touch-action:pan-y;">
        <div class="slide" id="slide"><div class="loading">加载中...</div></div>
      </div>
    </div>`;

  const progress = document.getElementById('progress');
  const slide = document.getElementById('slide');
  progress.style.width = '25%';
  try {
    const song = _songIndexMem?.find(s => s.path === path);
    const cacheKey = song?.rev || path;
    let blob = await idbGet('images', cacheKey);
    if (blob) {
      touchLRUImage(cacheKey);
    } else {
      progress.style.width = '60%';
      blob = await dbxDownloadBytes(path);
      idbSafeSet('images', cacheKey, blob).then(() => touchLRUImage(cacheKey));
    }
    progress.style.width = '100%';
    const url = URL.createObjectURL(blob);
    const img = new Image();
    img.src = url;
    img.style.cssText = 'width:100%;height:auto;display:block;';
    img.onload = () => { progress.style.width = '0'; URL.revokeObjectURL(url); };
    slide.innerHTML = '';
    slide.appendChild(img);
  } catch (err) {
    progress.style.width = '0';
    slide.innerHTML = `<div class="err">加载失败：${escapeHtml(err.message || String(err))}</div>`;
  }
}

//==============================================================
// Router
//==============================================================
function destroyViewer() {
  if (viewer) { viewer.destroy(); viewer = null; }
}

function route() {
  const h = location.hash || '#/';
  destroyViewer();
  document.body.classList.remove('fs');
  if (h.startsWith('#/w/')) {
    renderSongViewer(decodeURIComponent(h.slice(4)));
  } else if (h.startsWith('#/song/')) {
    renderLibrarySong(decodeURIComponent(h.slice(7)));
  } else if (h === '#/stats') {
    renderStats();
  } else {
    renderWeekList();
  }
}

window.addEventListener('hashchange', route);
backBtn.addEventListener('click', () => {
  if (location.hash && location.hash !== '#/') location.hash = '#/';
  else history.back();
});
refreshBtn.addEventListener('click', async () => {
  refreshBtn.style.opacity = '0.4';
  destroyViewer();
  if (location.hash.startsWith('#/w/')) {
    await renderSongViewer(decodeURIComponent(location.hash.slice(4)), true);
  } else if (location.hash === '#/stats') {
    await renderStats();
  } else {
    await renderWeekList(true);
  }
  refreshBtn.style.opacity = '';
});

route();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js?v=' + APP_VERSION).catch(() => {});
}
</script>
